name: Sync and deploy

on:
  push:
    branches: [main]
  schedule:
    # Daily rebuild — pulls latest Google Docs + study PDFs, redeploys Pages
    - cron: "0 14 * * *"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Sync Google Docs and study PDFs
        run: npm run sync
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SYNC_REQUIRED: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

      - run: npm test

      - name: Build site
        run: npm run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
