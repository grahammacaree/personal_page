<footer class="site-footer">
  <!-- Jupiter + Galilean moons at real sky positions — see JOVIAN.md in the repo -->
  <svg
    class="site-footer-jovian"
    aria-hidden="true"
    focusable="false"
  >
    <line class="site-footer-jovian-orbit" x1="0" y1="0" x2="0" y2="0" />
    <g class="site-footer-jovian-back" />
    <circle class="site-footer-jovian-jupiter" cx="0" cy="0" r="4.06" />
    <g class="site-footer-jovian-front" />
    <circle class="site-footer-jovian-moon" data-moon="io" cx="0" cy="0" r="1.44" />
    <circle class="site-footer-jovian-moon" data-moon="europa" cx="0" cy="0" r="1.31" />
    <circle class="site-footer-jovian-moon" data-moon="ganymede" cx="0" cy="0" r="1.56" />
    <circle class="site-footer-jovian-moon" data-moon="callisto" cx="0" cy="0" r="1.5" />
  </svg>
  <p class="site-footer-copy">© {{year}} {{siteName}}</p>
  {{#showAboutLink}}
  <a href="{{aboutHref}}" class="site-footer-about">About this site</a>
  {{/showAboutLink}}
</footer>
