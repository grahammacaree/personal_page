<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>{{documentTitle}}</title>
    {{#canonicalUrl}}
    <link rel="canonical" href="{{canonicalUrl}}" />
    <meta property="og:url" content="{{canonicalUrl}}" />
    {{/canonicalUrl}}
    {{#metaDescription}}
    <meta name="description" content="{{metaDescription}}" />
    <meta property="og:title" content="{{documentTitle}}" />
    <meta property="og:description" content="{{metaDescription}}" />
    {{/metaDescription}}
    {{#lastmod}}
    <meta property="og:updated_time" content="{{lastmod}}" />
    <meta property="article:modified_time" content="{{lastmod}}" />
    {{/lastmod}}
    {{#personJsonLd}}
    <script type="application/ld+json">{{personJsonLd}}</script>
    {{/personJsonLd}}
    <link rel="icon" href="{{basePath}}favicon.svg" type="image/svg+xml" sizes="any" />
    <link rel="icon" href="{{basePath}}favicon-48.png" type="image/png" sizes="48x48" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{basePath}}style.css" />
  </head>
  <body class="{{bodyClass}}">
    {{siteTopBar}}
    <main id="main" class="site-main">
      {{body}}
    </main>
    {{siteFooter}}
    {{pageScripts}}
  </body>
</html>
